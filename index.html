<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IguVpn — Подключение...</title>
    <!-- Подключаем библиотеку Telegram Web App для управления окном внутри мессенджера -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        /* Простой анимированный спиннер загрузки */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            display: none;
            color: #ff5252;
            margin-top: 20px;
            background: rgba(255, 82, 82, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="spinner" class="spinner"></div>
        <h1 id="mainTitle">Открываем приложение...</h1>
        <p id="mainText">Пожалуйста, подождите. Сейчас откроется приложение для импорта подписки.</p>

        <div id="errorBox" class="error-message">
            Не удалось автоматически открыть приложение. <br><br>
            Убедитесь, что оно установлено, или вернитесь в бота и скопируйте ссылку вручную.
        </div>
    </div>

    <script>
        window.onload = function() {
            // Сообщаем Telegram, что Web App готово к работе
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('url');

            // Определяем мобильное ли это устройство с помощью User-Agent
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (redirectUrl) {
                // 1. Инициируем переход по deeplink
                window.location.href = redirectUrl;

                if (isMobile) {
                    // === ЛОГИКА ДЛЯ ТЕЛЕФОНОВ ===
                    // Ждем 1.5 секунды и закрываем окно
                    setTimeout(function() {
                        try {
                            if (window.Telegram && window.Telegram.WebApp) {
                                window.Telegram.WebApp.close();
                            }
                            window.close();
                        } catch (e) {
                            console.log("Не удалось закрыть окно автоматически");
                        }
                    }, 1500);

                    // Если не закрылось через 3.5 секунды - показываем ошибку
                    setTimeout(function() {
                        document.getElementById('errorBox').style.display = 'block';
                    }, 3500);

                } else {
                    // === ЛОГИКА ДЛЯ КОМПЬЮТЕРОВ (ПК) ===
                    // На ПК браузеры показывают окно "Открыть приложение?".
                    // Если мы закроем вкладку скриптом, окно пропадет, поэтому мы НЕ закрываем её.

                    document.getElementById('mainTitle').innerText = "Подтвердите действие";
                    document.getElementById('mainText').innerHTML = "В верхней части браузера должно появиться окно.<br>Нажмите <b>«Открыть»</b> или <b>«Разрешить»</b>, чтобы передать настройки в VPN-клиент.<br><br><i>Эту вкладку можно будет закрыть вручную.</i>";

                    // Останавливаем спиннер через 2 секунды (так как дальше загрузки нет, ждем действий юзера)
                    setTimeout(function() {
                        document.getElementById('spinner').style.display = 'none';
                    }, 2000);

                    // Показываем ошибку только если прошло много времени (10 сек)
                    setTimeout(function() {
                        document.getElementById('errorBox').innerHTML = "Если приложение не открылось, убедитесь, что оно установлено на вашем ПК.";
                        document.getElementById('errorBox').style.display = 'block';
                    }, 10000);
                }

            } else {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('errorBox').innerHTML = "Ошибка: Ссылка для подключения не найдена.";
                document.getElementById('errorBox').style.display = 'block';
            }
        }
    </script>
</body>
</html>
