<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IguVpn — Подключение...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            display: none;
            color: #ff5252;
            margin-top: 20px;
            background: rgba(255, 82, 82, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .connect-btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: #2481cc;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .connect-btn:hover {
            background-color: #1d69a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="spinner" class="spinner"></div>
        <h1 id="mainTitle">Открываем приложение...</h1>
        <p id="mainText">Пожалуйста, подождите. Сейчас откроется приложение для импорта подписки.</p>

        <div id="btnContainer" style="display: none;">
            <a id="connectBtn" href="#" class="connect-btn">🚀 Открыть приложение</a>
        </div>

        <div id="errorBox" class="error-message">
            Не удалось автоматически открыть приложение. <br><br>
            Убедитесь, что оно установлено, или вернитесь в бота и скопируйте ссылку вручную.
        </div>
    </div>

    <script>
        window.onload = function() {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('url');

            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (redirectUrl) {
                if (isMobile) {
                    window.location.href = redirectUrl;

                    setTimeout(function() {
                        try {
                            if (window.Telegram && window.Telegram.WebApp) {
                                window.Telegram.WebApp.close();
                            }
                            window.close();
                        } catch (e) {
                            console.log("Не удалось закрыть окно автоматически");
                        }
                    }, 1500);

                    setTimeout(function() {
                        document.getElementById('errorBox').style.display = 'block';
                    }, 3500);

                } else {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('mainTitle').innerText = "Подключение с ПК";
                    document.getElementById('mainText').innerHTML = "Нажмите на кнопку ниже, чтобы передать настройки в VPN-клиент.<br><br><i>Браузер может запросить разрешение на открытие ссылки — разрешите его. Эту вкладку потом можно будет закрыть.</i>";

                    const btn = document.getElementById('connectBtn');
                    btn.href = redirectUrl;
                    document.getElementById('btnContainer').style.display = 'block';
                }

            } else {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('errorBox').innerHTML = "Ошибка: Ссылка для подключения не найдена.";
                document.getElementById('errorBox').style.display = 'block';
            }
        }
    </script>
</body>
</html>
