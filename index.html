<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IguVpn — Подключение...</title>
    <!-- Подключаем библиотеку Telegram Web App для управления окном внутри мессенджера -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 30px;
        }
        /* Простой анимированный спиннер загрузки */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            display: none;
            color: #ff5252;
            margin-top: 20px;
            background: rgba(255, 82, 82, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h1>Открываем приложение...</h1>
        <p>Пожалуйста, подождите. Сейчас откроется приложение для импорта подписки.</p>

        <div id="errorBox" class="error-message">
            Не удалось автоматически открыть приложение. <br><br>
            Убедитесь, что оно установлено, или вернитесь в бота и скопируйте ссылку вручную.
        </div>
    </div>

    <script>
        window.onload = function() {
            // Сообщаем Telegram, что Web App готово к работе
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('url');

            if (redirectUrl) {
                // 1. Пытаемся перенаправить пользователя по deeplink
                window.location.href = redirectUrl;

                // 2. Ждем 1 секунду (чтобы система успела перехватить ссылку) и закрываем окно
                setTimeout(function() {
                    try {
                        // Метод закрытия для Telegram
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.close();
                        }
                        // Запасной метод для обычных браузеров
                        window.close();
                    } catch (e) {
                        console.log("Не удалось закрыть окно автоматически");
                    }
                }, 1000);

                // 3. Если через 3.5 секунды мы все еще на этой странице (например, приложение не установлено),
                // показываем сообщение об ошибке.
                setTimeout(function() {
                    document.getElementById('errorBox').style.display = 'block';
                }, 3500);
            } else {
                document.getElementById('errorBox').innerHTML = "Ошибка: Ссылка для подключения не найдена.";
                document.getElementById('errorBox').style.display = 'block';
            }
        }
    </script>
</body>
</html>
